name: Terraform Validate & Plan
description: Runs terraform fmt, init, validate and plan against a given environment

inputs:
  working-directory:
    description: Directory containing Terraform configuration
    required: true
  tfvars:
    description: Path to tfvars file (relative to working-directory)
    required: true
  tf-backend-bucket:
    description: S3 bucket for Terraform state backend
    required: true
  tf-backend-key:
    description: Key for Terraform state in S3
    required: true
  aws-role-arn:
    description: AWS IAM role ARN to assume
    required: true
  aws-region:
    description: AWS region
    required: false
    default: sa-east-1
  terraform-version:
    description: Terraform version to use
    required: false
    default: '1.14.8'

runs:
  using: composite
  steps:
    - uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Terraform Format Check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform fmt -check -recursive

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        terraform init \
          -backend-config="bucket=${{ inputs.tf-backend-bucket }}" \
          -backend-config="key=${{ inputs.tf-backend-key }}"

    - name: Terraform Validate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform validate

    - name: Terraform Plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terraform plan -var-file=${{ inputs.tfvars }} -no-color
